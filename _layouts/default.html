<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page['share-description'] | default: page.subtitle | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% if site.site-css %}
      {% for stylesheet in site.site-css %}
        <link rel="stylesheet" href="{{ stylesheet | relative_url }}">
      {% endfor %}
    {% endif %}
  </head>
  <body>
    {% include site-header.html %}

    <main id="content">
      {{ content }}
    </main>

    {% include site-footer.html %}

    {% if site.site-js %}
      {% for script in site.site-js %}
        <script src="{{ script | relative_url }}" defer></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
