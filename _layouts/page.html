---
layout: default
---
<section class="page-hero">
  <div class="shell page-hero__inner" data-reveal>
    {% if page.kicker %}
      <p class="section-kicker">{{ page.kicker }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-hero__lede">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content">
  <div class="shell page-content__inner">
    {{ content }}
  </div>
</section>
